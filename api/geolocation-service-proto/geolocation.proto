syntax = "proto3";

package geolocation.v1;

option go_package = "diploma/api/geolocation-service-proto;geolocationpb";

service GeolocationService {
  rpc FindNearbyWorkers(FindNearbyWorkersRequest) returns (FindNearbyWorkersResponse);
}

message FindNearbyWorkersRequest {
  int64 category_id = 1;
  double latitude = 2;
  double longitude = 3;
  int64 radius_meters = 4;
}

message FindNearbyWorkersResponse {
  repeated NearbyWorker workers = 1;
}

message NearbyWorker {
  int64 worker_id = 1;
  string full_name = 2;
  int64 price = 3;
  string experience_level = 4;
  string category_name = 5;
  double latitude = 6;
  double longitude = 7;
  double distance_meters = 8;
}
