openapi: 3.0.3
info:
  title: Workers Marketplace Platform API
  version: 1.0.0
  description: |
    OpenAPI documentation for the Workers Marketplace Platform HTTP API exposed
    through the API gateway. Public authentication routes are available under
    `/auth`. Protected application routes are available under `/api` and require
    a Bearer JWT.
servers:
  - url: http://localhost:8080
    description: Local API gateway
tags:
  - name: Health
  - name: Auth
  - name: Profiles
  - name: Workers
  - name: Identity
  - name: Admin
  - name: Reports
  - name: Payments
  - name: Requests
  - name: Bookings
  - name: Reviews
  - name: Chats
  - name: Geolocation
  - name: Notifications
  - name: Webhooks

paths:
  /healthz:
    get:
      tags:
        - Health
      summary: Check API gateway health
      responses:
        "200":
          description: Gateway is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a customer or worker account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/verify:
    get:
      tags:
        - Auth
      summary: Verify email by token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Access token refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/resend-verification:
    post:
      tags:
        - Auth
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Verification email sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset link
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Reset flow accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset:
    get:
      tags:
        - Auth
      summary: Redirect to frontend password reset page
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirects to the frontend reset page.

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/select-role:
    post:
      tags:
        - Auth
      summary: Select account role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectRoleRequest"
      responses:
        "200":
          description: Role selected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/customer/profile:
    get:
      tags:
        - Profiles
      summary: Get current customer profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customer profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Profiles
      summary: Create or update current customer profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerProfileRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CustomerProfileMultipartRequest"
      responses:
        "200":
          description: Customer profile saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/profile:
    get:
      tags:
        - Profiles
      summary: Get current worker profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Worker profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Profiles
      summary: Create or update current worker profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerProfileRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/WorkerProfileMultipartRequest"
      responses:
        "200":
          description: Worker profile saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/skills:
    post:
      tags:
        - Workers
      summary: Add worker skill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWorkerSkillRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddWorkerSkillMultipartRequest"
      responses:
        "200":
          description: Worker skill added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddWorkerSkillResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/identity-document:
    post:
      tags:
        - Identity
      summary: Upload worker identity document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadIdentityDocumentRequest"
      responses:
        "200":
          description: Identity document uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerIdentityDocument"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/skill-upgrades:
    post:
      tags:
        - Workers
      summary: Request a worker skill level upgrade
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/WorkerSkillUpgradeRequest"
      responses:
        "200":
          description: Upgrade request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerSkillUpgradeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/availability:
    patch:
      tags:
        - Workers
      summary: Update current worker availability
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityRequest"
      responses:
        "200":
          description: Availability updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/categories:
    get:
      tags:
        - Workers
      summary: List service categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Service categories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceCategory"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/workers:
    get:
      tags:
        - Workers
      summary: Find available verified workers by category
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Matching workers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkerSearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/verify-skill:
    post:
      tags:
        - Admin
      summary: Verify a worker skill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyWorkerSkillRequest"
      responses:
        "200":
          description: Skill and worker verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/verify-skill-upgrade:
    post:
      tags:
        - Admin
      summary: Approve a pending worker skill upgrade
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyWorkerSkillUpgradeRequest"
      responses:
        "200":
          description: Skill upgrade approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/assign-identity-document:
    post:
      tags:
        - Identity
      summary: Assign an identity document to current staff user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityDocumentIDRequest"
      responses:
        "200":
          description: Identity document assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/verify-identity-document:
    post:
      tags:
        - Identity
      summary: Verify a worker identity document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityDocumentIDRequest"
      responses:
        "200":
          description: Identity document verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/reject-identity-document:
    post:
      tags:
        - Identity
      summary: Reject a worker identity document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectIdentityDocumentRequest"
      responses:
        "200":
          description: Identity document rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/overview:
    get:
      tags:
        - Admin
      summary: Get admin overview dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/users:
    get:
      tags:
        - Admin
      summary: List users for admin dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/admins:
    post:
      tags:
        - Admin
      summary: Create admin user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Admin user created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreatedUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/managers:
    post:
      tags:
        - Admin
      summary: Create manager user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Manager user created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreatedUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/profile:
    get:
      tags:
        - Admin
      summary: Get customer or worker profile details for staff review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: Staff profile view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/activate:
    patch:
      tags:
        - Admin
      summary: Activate user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/users/{id}:
    delete:
      tags:
        - Admin
      summary: Deactivate user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User deactivated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/payment-method:
    get:
      tags:
        - Payments
      summary: Get current user's payment methods
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payment method status and saved cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Payments
      summary: Save a payment method manually
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPaymentMethodRequest"
      responses:
        "200":
          description: Payment method saved and selected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/payment-method/{id}/select:
    patch:
      tags:
        - Payments
      summary: Select an existing payment method
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaymentMethodID"
      responses:
        "200":
          description: Payment method selected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/payment-method/stripe/setup-session:
    post:
      tags:
        - Payments
      summary: Create a Stripe setup session URL
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stripe setup session URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSetupSessionResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/payment-method/stripe/confirm:
    post:
      tags:
        - Payments
      summary: Confirm a Stripe setup session and save the card
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPaymentSetupSessionRequest"
      responses:
        "200":
          description: Card saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/reports:
    get:
      tags:
        - Reports
      summary: List reports visible to current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reports.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Reports
      summary: Create a support report
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateReportMultipartRequest"
      responses:
        "201":
          description: Report created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/reports/{report_id}/messages:
    get:
      tags:
        - Reports
      summary: List report messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
        - $ref: "#/components/parameters/ReportSide"
      responses:
        "200":
          description: Report messages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags:
        - Reports
      summary: Add a report message
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
        - $ref: "#/components/parameters/ReportSide"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReportMessageRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddReportMessageMultipartRequest"
      responses:
        "201":
          description: Message created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/admin/reports/{report_id}/assign:
    patch:
      tags:
        - Reports
      summary: Assign report to current staff user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      responses:
        "200":
          description: Report assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/reports/{report_id}/penalty:
    post:
      tags:
        - Reports
      summary: Apply a report penalty
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReportPenaltyRequest"
      responses:
        "200":
          description: Penalty applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Penalty"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/penalties/{penalty_id}/cancel:
    patch:
      tags:
        - Reports
      summary: Cancel an active penalty
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PenaltyID"
      responses:
        "200":
          description: Penalty cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/reports/{report_id}/close:
    patch:
      tags:
        - Reports
      summary: Close a report as resolved or rejected
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseReportRequest"
      responses:
        "200":
          description: Report closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/requests:
    post:
      tags:
        - Requests
      summary: Create a service request
      security:
