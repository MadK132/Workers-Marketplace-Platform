openapi: 3.0.3
info:
  title: Workers Marketplace Platform API
  version: 1.0.0
  description: |
    OpenAPI documentation for the Workers Marketplace Platform HTTP API exposed
    through the API gateway. Public authentication routes are available under
    `/auth`. Protected application routes are available under `/api` and require
    a Bearer JWT.
servers:
  - url: http://localhost:8080
    description: Local API gateway
tags:
  - name: Health
  - name: Auth
  - name: Profiles
  - name: Workers
  - name: Admin
  - name: Requests
  - name: Bookings
  - name: Chats
  - name: Geolocation
  - name: Notifications

paths:
  /healthz:
    get:
      tags:
        - Health
      summary: Check API gateway health
      responses:
        "200":
          description: Gateway is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a customer or worker account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/verify:
    get:
      tags:
        - Auth
      summary: Verify email by token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Access token refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/resend-verification:
    post:
      tags:
        - Auth
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Verification email sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset link
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Reset flow accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset:
    get:
      tags:
        - Auth
      summary: Redirect to frontend password reset page
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirects to the frontend reset page.

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/select-role:
    post:
      tags:
        - Auth
      summary: Select account role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectRoleRequest"
      responses:
        "200":
          description: Role selected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/customer/profile:
    get:
      tags:
        - Profiles
      summary: Get current customer profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customer profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Profiles
      summary: Create or update current customer profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerProfileRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CustomerProfileMultipartRequest"
      responses:
        "200":
          description: Customer profile saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/profile:
    get:
      tags:
        - Profiles
      summary: Get current worker profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Worker profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Profiles
      summary: Create or update current worker profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerProfileRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/WorkerProfileMultipartRequest"
      responses:
        "200":
          description: Worker profile saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProfile"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/skills:
    post:
      tags:
        - Workers
      summary: Add worker skill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWorkerSkillRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddWorkerSkillMultipartRequest"
      responses:
        "200":
          description: Worker skill added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddWorkerSkillResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/worker/availability:
    patch:
      tags:
        - Workers
      summary: Update current worker availability
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityRequest"
      responses:
        "200":
          description: Availability updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/categories:
    get:
      tags:
        - Workers
      summary: List service categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Service categories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceCategory"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/workers:
    get:
      tags:
        - Workers
      summary: Find available verified workers by category
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Matching workers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkerSearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/verify-skill:
    post:
      tags:
        - Admin
      summary: Verify a worker skill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyWorkerSkillRequest"
      responses:
        "200":
          description: Skill and worker verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/overview:
    get:
      tags:
        - Admin
      summary: Get admin overview dashboard data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/users:
    get:
      tags:
        - Admin
      summary: List users for admin dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/admins:
    post:
      tags:
        - Admin
      summary: Create admin user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Admin user created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreatedUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/managers:
    post:
      tags:
        - Admin
      summary: Create manager user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Manager user created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreatedUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}/activate:
    patch:
      tags:
        - Admin
      summary: Activate user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/users/{id}:
    delete:
      tags:
        - Admin
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/requests:
    post:
      tags:
        - Requests
      summary: Create a service request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "200":
          description: Request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceRequestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/requests/my:
    get:
      tags:
        - Requests
      summary: List current customer's requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current customer's requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestListItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/bookings:
    post:
      tags:
        - Bookings
      summary: Create booking for a request and worker
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "200":
          description: Booking created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/bookings/my:
    get:
      tags:
        - Bookings
      summary: List current user's bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user's bookings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingListItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/bookings/{booking_id}/start:
    patch:
      tags:
        - Bookings
      summary: Start booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingID"
      responses:
        "200":
          description: Booking started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/bookings/{booking_id}/complete:
    patch:
      tags:
        - Bookings
      summary: Complete booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingID"
      responses:
        "200":
          description: Booking completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/chats:
    get:
      tags:
        - Chats
      summary: List current user's chats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chats.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Chats
      summary: Create chat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRequest"
      responses:
        "200":
          description: Chat created or returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/chats/{chat_id}/messages:
    get:
      tags:
        - Chats
      summary: List chat messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatID"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: before_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        "200":
          description: Chat messages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Chats
      summary: Send chat message
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/chats/{chat_id}/read:
    patch:
      tags:
        - Chats
      summary: Mark chat messages as read
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "200":
          description: Messages marked read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/chats/{chat_id}/ws:
    get:
      tags:
        - Chats
      summary: Open chat WebSocket
      description: |
        Opens a WebSocket connection for a chat. The HTTP gateway route requires
        the same Bearer JWT as the other `/api` routes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "101":
          description: WebSocket upgrade.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/geo/workers/nearby:
    get:
      tags:
        - Geolocation
      summary: Find nearby workers
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: query
          required: true
          schema:
            type: integer
        - name: latitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius_meters
          in: query
          required: false
          schema:
            type: integer
            default: 5000
      responses:
        "200":
          description: Nearby workers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyWorker"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/geo/worker/location:
    patch:
      tags:
        - Geolocation
      summary: Update current worker location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationRequest"
      responses:
        "200":
          description: Location updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/geo/customer/location:
    patch:
      tags:
        - Geolocation
      summary: Update current customer location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationRequest"
      responses:
        "200":
          description: Location updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/notifications:
    get:
      tags:
        - Notifications
      summary: List current user's notifications
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: unread
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Notifications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/notifications/{notification_id}/read:
    patch:
      tags:
        - Notifications
      summary: Mark one notification as read
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotificationID"
      responses:
        "200":
          description: Notification updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: Mark all current user's notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications marked read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkAllNotificationsReadResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserID:
      name: id
      in: path
      required: true
      schema:
        type: integer
    BookingID:
      name: booking_id
      in: path
