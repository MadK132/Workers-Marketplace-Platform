          $ref: "#/components/responses/InternalServerError"

  /api/notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: Mark all current user's notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications marked read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkAllNotificationsReadResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /webhooks/stripe:
    post:
      tags:
        - Webhooks
      summary: Receive Stripe checkout webhook
      description: Direct payment-service webhook endpoint. It is served by the payment service, not by the API gateway.
      servers:
        - url: http://localhost:8096
          description: Local payment webhook service
      parameters:
        - name: Stripe-Signature
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeWebhookEvent"
      responses:
        "200":
          description: Event accepted or ignored.
        "400":
          description: Invalid payload or signature.
        "404":
          description: Payment not found.
        "405":
          description: Method not allowed.
        "500":
          description: Payment update failed.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserID:
      name: id
      in: path
      required: true
      schema:
        type: integer
    BookingID:
      name: booking_id
      in: path
      required: true
      schema:
        type: integer
    ChatID:
      name: chat_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    NotificationID:
      name: notification_id
      in: path
      required: true
      schema:
        type: integer
    WorkerProfileID:
      name: worker_profile_id
      in: path
      required: true
      schema:
        type: integer
    ReportID:
      name: report_id
      in: path
      required: true
      schema:
        type: integer
    PenaltyID:
      name: penalty_id
      in: path
      required: true
      schema:
        type: integer
    PaymentMethodID:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ReportSide:
      name: side
      in: query
      required: false
      description: Staff can choose which report conversation to view. Non-staff users are mapped to their own side.
      schema:
        type: string
        enum:
          - reporter
          - reported

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PaymentRequired:
      description: Payment method is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Upstream provider error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status

    Role:
      type: string
      enum:
        - customer
        - worker
        - admin
        - manager

    UserStatus:
      type: string
      enum:
        - active
        - inactive
        - banned

    ExperienceLevel:
      type: string
      enum:
        - junior
        - middle
        - senior

    RegisterRequest:
      type: object
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        password:
          type: string
          format: password
        role:
          $ref: "#/components/schemas/Role"
      required:
        - full_name
        - email
        - password
        - role

    RegisterResponse:
      type: object
      properties:
        user_id:
          type: integer
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/UserStatus"
        created_at:
          type: string
          format: date-time
        message:
          type: string
      required:
        - user_id
        - full_name
        - email
        - role
        - status
        - created_at
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_at

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required:
        - refresh_token

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
      required:
        - access_token
        - expires_at

    EmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          format: password
      required:
        - token
        - new_password

    SelectRoleRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/Role"
      required:
        - role

    CustomerProfileRequest:
      type: object
      properties:
        address:
          type: string
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        bio:
          type: string
        profile_photo_url:
          type: string
          nullable: true

    CustomerProfileMultipartRequest:
      type: object
      properties:
        address:
          type: string
